name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1: Build image and push to Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # STEP 1: Always download the code FIRST!
      - name: Checkout code
        uses: actions/checkout@v3

      # STEP 2: Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # STEP 3: Now that we have the code, we can build it
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-visitor-app:latest

  # JOB 2: Connect to AWS and Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      # Step 1: Download code so we have the 'docker-compose.yml' file
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Ensure the folder exists on AWS
      - name: Create app directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: mkdir -p ~/app

      # Step 3: Copy the docker-compose file to AWS
      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      # Step 4: Run the containers
      - name: Finalize Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/app
            docker compose pull
            docker compose up -d
